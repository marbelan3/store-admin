# If "Port 8080 already in use" — kill the old process:
#   lsof -ti:8080 | xargs kill -9
server:
  port: 8080

spring:
  profiles:
    active: dev

  application:
    name: store-admin

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/g2u_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:g2u}
    password: ${MYSQL_PASSWORD:g2u_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,profile,email
            redirect-uri: http://localhost:8080/google-callback
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub

app:
  upload:
    dir: ./uploads
  jwt:
    secret: ${JWT_SECRET:dev-secret-at-least-256-bits-long-do-not-use-in-production-12345}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}
  swagger:
    enabled: true  # Set to false in production

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
