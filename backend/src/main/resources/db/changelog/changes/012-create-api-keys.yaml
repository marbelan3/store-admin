databaseChangeLog:
  - changeSet:
      id: 012-create-api-keys
      author: g2u-team
      changes:
        - createTable:
            tableName: api_keys
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: key_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: key_prefix
                  type: VARCHAR(8)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_used_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: api_keys
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_api_keys_tenant
            onDelete: CASCADE
        - createIndex:
            tableName: api_keys
            indexName: idx_api_keys_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: api_keys
            indexName: idx_api_keys_key_hash
            unique: true
            columns:
              - column:
                  name: key_hash
