databaseChangeLog:
  - changeSet:
      id: 021-create-orders
      author: g2u-team
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
              - column:
                  name: customer_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: customer_email
                  type: VARCHAR(255)
              - column:
                  name: customer_phone
                  type: VARCHAR(50)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: subtotal
                  type: DECIMAL(12,2)
              - column:
                  name: tax_amount
                  type: DECIMAL(12,2)
              - column:
                  name: shipping_amount
                  type: DECIMAL(12,2)
              - column:
                  name: total_amount
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  defaultValue: USD
              - column:
                  name: shipping_address
                  type: VARCHAR(1000)
              - column:
                  name: billing_address
                  type: VARCHAR(1000)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_orders_tenant
            onDelete: CASCADE

        - createIndex:
            tableName: orders
            indexName: idx_orders_tenant
            columns:
              - column:
                  name: tenant_id

        - createIndex:
            tableName: orders
            indexName: idx_orders_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: orders
            indexName: idx_orders_created
            columns:
              - column:
                  name: created_at
                  descending: true

        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BINARY(16)
              - column:
                  name: variant_id
                  type: BINARY(16)
              - column:
                  name: product_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: variant_info
                  type: VARCHAR(255)
              - column:
                  name: sku
                  type: VARCHAR(100)
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: total_price
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_order_items_order
            onDelete: CASCADE

        - createIndex:
            tableName: order_items
            indexName: idx_order_items_order
            columns:
              - column:
                  name: order_id

        - createTable:
            tableName: order_status_history
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
              - column:
                  name: from_status
                  type: VARCHAR(20)
              - column:
                  name: to_status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: changed_by
                  type: BINARY(16)
              - column:
                  name: note
                  type: VARCHAR(500)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: order_status_history
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_order_status_history_order
            onDelete: CASCADE

        - createIndex:
            tableName: order_status_history
            indexName: idx_order_status_history_order
            columns:
              - column:
                  name: order_id
