databaseChangeLog:
  - changeSet:
      id: 007-create-tags
      author: g2u-team
      changes:
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: tags
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_tags_tenant
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: tags
            columnNames: tenant_id, slug
            constraintName: uq_tags_tenant_slug
        - createIndex:
            tableName: tags
            indexName: idx_tags_tenant
            columns:
              - column:
                  name: tenant_id
