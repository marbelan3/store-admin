databaseChangeLog:
  - changeSet:
      id: 002-create-users
      author: g2u-team
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
                  constraints:
                    nullable: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: TEXT
              - column:
                  name: oauth_provider
                  type: VARCHAR(20)
              - column:
                  name: oauth_provider_id
                  type: VARCHAR(255)
              - column:
                  name: role
                  type: VARCHAR(30)
                  defaultValue: TENANT_VIEWER
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_users_tenant
            onDelete: SET NULL
        - createIndex:
            tableName: users
            indexName: idx_users_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: users
            indexName: idx_users_email
            unique: true
            columns:
              - column:
                  name: email
        - createIndex:
            tableName: users
            indexName: idx_users_oauth
            columns:
              - column:
                  name: oauth_provider
              - column:
                  name: oauth_provider_id
