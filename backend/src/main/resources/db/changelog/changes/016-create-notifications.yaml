databaseChangeLog:
  - changeSet:
      id: 016-create-notifications
      author: g2u-team
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BINARY(16)
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: VARCHAR(500)
              - column:
                  name: is_read
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: tenant_id
            referencedTableName: tenants
            referencedColumnNames: id
            constraintName: fk_notifications_tenant
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: notifications
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_notifications_user
            onDelete: SET NULL
        - createIndex:
            tableName: notifications
            indexName: idx_notifications_tenant_read_created
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: is_read
              - column:
                  name: created_at
                  descending: true
